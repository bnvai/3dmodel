# UNETR++ local training — RTX 4060 8GB
# So sánh với AnisotropicUNet3D (train_config_anisotropic_local.yaml)
# Chạy: python -m pytorch3dunet.train --config resources/3DSemiconductor/train_config_unetr_pp_local.yaml

model:
  name: UNETR_PP_SAM
  in_channels: 1
  out_channels: 6
  img_size: [80, 160, 160]
  feature_size: 16
  hidden_size: 256
  num_heads: 4
  depths: [3, 3, 3, 3]
  dims: [32, 64, 128, 256]
  final_sigmoid: false
  is_segmentation: true

trainer:
  checkpoint_dir: D:\Working\10. AI-Workspace\model\pytorch-3dunet\resources\3DSemiconductor\checkpoints_unetr_pp
  resume: null
  pre_trained: null
  validate_after_iters: 1000
  log_after_iters: 500
  max_num_epochs: 200
  max_num_iterations: 100000
  eval_score_higher_is_better: true
  early_stopping_patience: 20
  max_val_images: 20
  max_grad_norm: 1.0

loss:
  name: CrossEntropyLoss
  weight: [ 0.10, 1.49, 0.94, 0.59, 2.54, 0.34 ]

optimizer:
  name: AdamW
  learning_rate: 0.0001
  weight_decay: 0.0001

eval_metric:
  name: MeanIoU
  skip_background: true

lr_scheduler:
  name: CosineAnnealingLR
  T_max: 100
  eta_min: 0.000001

loaders:
  dataset: LazyHDF5Dataset
  batch_size: 1
  num_workers: 2
  raw_internal_path: image
  label_internal_path: label
  global_normalization: false

  train:
    file_paths:
      - D:\Working\10. AI-Workspace\model\pytorch-3dunet\resources\dataset\train

    slice_builder:
      name: FilterSliceBuilder
      patch_shape: [80, 160, 160]
      stride_shape: [20, 20, 20]
      threshold: 0.01
      slack_acceptance: 0.33

    transformer:
      raw:
        - name: Standardize
        - name: RandomFlip
        - name: RandomRotate90
        - name: RandomRotate
          axes: [[2, 1]]
          angle_spectrum: 30
          mode: reflect
        - name: ElasticDeformation
          spline_order: 3
        - name: AdditiveGaussianNoise
          scale: [0, 0.1]
        - name: ToTensor
          expand_dims: true
      label:
        - name: RandomFlip
        - name: RandomRotate90
        - name: RandomRotate
          axes: [[2, 1]]
          angle_spectrum: 30
          mode: reflect
        - name: ElasticDeformation
          spline_order: 0
        - name: ToTensor
          expand_dims: false
          dtype: int64

  val:
    file_paths:
      - D:\Working\10. AI-Workspace\model\pytorch-3dunet\resources\dataset\val

    slice_builder:
      name: FilterSliceBuilder
      patch_shape: [80, 160, 160]
      stride_shape: [80, 160, 160]
      threshold: 0.01
      slack_acceptance: 0.01

    transformer:
      raw:
        - name: Standardize
        - name: ToTensor
          expand_dims: true
      label:
        - name: ToTensor
          expand_dims: false
          dtype: int64
